<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Հարսանեկան Հյուրերի Ցուցակ</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f8f3ff 0%, #e8dcff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .wedding-card {
            background: rgba(255, 255, 255, 0.96);
            padding: 40px 30px;
            border-radius: 22px;
            box-shadow: 0 12px 35px rgba(120, 90, 180, 0.15);
            border: 1px solid #e4d7ff;
            text-align: center;
            max-width: 470px;
            width: 100%;
        }

        .wedding-card::before {
            content: "👰‍🤵‍";
            font-size: 36px;
            display: block;
            margin-bottom: 15px;
        }

        h1 {
            color: #4d4260;
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        p {
            color: #7d7092;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
/*whole table*/
        .btn-all {
            background: linear-gradient(135deg, #ffffff 0%, #ece8f7 100%);
            color: #5a4c78;
            border: 2px solid #d8cffa;
        }

        .btn-all:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(168, 142, 230, 0.35);
            background: linear-gradient(135deg, #fdfcff 0%, #e4dcfa 100%);
        }

       /*statistics*/
        .btn-stats {
            background: linear-gradient(135deg, #8f6be8 0%, #6f42c1 100%);
            color: white;
            border: 1px solid #6f42c1;
        }

        .btn-stats:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(111, 66, 193, 0.45);
        }

        /* bride */
        .btn-bride {
            background: linear-gradient(135deg, #ffe5ef 0%, #f7bfd1 100%);
            color: #704657;
            border: 1px solid #efb0c5;
        }

        .btn-bride:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(247, 191, 209, 0.55);
        }

        /* groom */
        .btn-groom {
            background: linear-gradient(135deg, #4d4260 0%, #2f283a 100%);
            color: white;
            border: 1px solid #2f283a;
        }

        .btn-groom:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(77, 66, 96, 0.45);
        }

        .footer-decor {
            margin-top: 30px;
            color: #a88ee6;
            font-size: 13px;
            letter-spacing: 3px;
        }
    </style>
</head>

<body>

    <div class="wedding-card">

        <h1>💍 Հարսանեկան Ցուցակներ</h1>

        <p>
            Բարի գալուստ հյուրերի կառավարման համակարգ։
            Ընտրեք ցանկալի բաժինը ցուցակները կամ վիճակագրությունը դիտելու համար։
        </p>

        <div class="btn-container">

            <a href="https://docs.google.com/spreadsheets/d/1wnLZcuP4B0WD4VEilzMoX0IU-RnJZ89Lt3UjrjYbpWg/edit?gid=800858477#gid=800858477"
               target="_blank"
               class="btn btn-all">
                📊 Ընդհանուր Մեծ Ցուցակ
            </a>

            <a href="https://docs.google.com/spreadsheets/d/1wnLZcuP4B0WD4VEilzMoX0IU-RnJZ89Lt3UjrjYbpWg/edit?gid=976080832#gid=976080832"
               target="_blank"
               class="btn btn-stats">
                📈 Դիտել Վիճակագրությունը
            </a>

            <a href="https://docs.google.com/spreadsheets/d/1wnLZcuP4B0WD4VEilzMoX0IU-RnJZ89Lt3UjrjYbpWg/edit?gid=267260056#gid=267260056"
               target="_blank"
               class="btn btn-bride">
                🌸 Հարսի Կողմի Ցուցակ
            </a>

            <a href="https://docs.google.com/spreadsheets/d/1wnLZcuP4B0WD4VEilzMoX0IU-RnJZ89Lt3UjrjYbpWg/edit?gid=453033215#gid=453033215"
               target="_blank"
               class="btn btn-groom">
                🤵 Փեսայի Կողմի Ցուցակ
            </a>

        </div>

        <div class="footer-decor">
            🤍 💜 🌸 💜 🤍
        </div>

    </div>

</body>
</html>
